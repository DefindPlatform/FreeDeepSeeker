name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Node.js ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [18, 20, 22, 24]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Lint
        if: matrix.os == 'ubuntu-latest' && matrix.node == 24
        run: npm run lint

      - name: Coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node == 24
        run: npm run coverage

      - name: Dependency audit
        if: matrix.os == 'ubuntu-latest' && matrix.node == 24
        run: npm audit --audit-level=high

  studio:
    name: Agent Studio production build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci --prefix dashboard

      - name: Build Agent Studio
        run: npm run studio:build

      - name: Install Chromium for E2E
        run: npm --prefix dashboard exec -- playwright install --with-deps chromium

      - name: Run Agent Studio E2E
        run: npm --prefix dashboard run e2e

      - name: Audit dashboard dependencies
        run: npm --prefix dashboard audit --audit-level=high

      - name: Validate npm package
        run: npm pack --dry-run
