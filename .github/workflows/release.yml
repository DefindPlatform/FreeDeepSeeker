name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify tag and release gate
        run: |
          npm run release:check -- "$GITHUB_REF_NAME"
          npm run check
      - name: Build release artifacts
        run: |
          mkdir -p artifacts
          npm pack --pack-destination artifacts
          (cd dashboard/dist && zip -qr ../../artifacts/agent-studio-${GITHUB_REF_NAME}.zip .)
          (cd chrome-extension && zip -qr ../artifacts/deepseek-auth-extension-${GITHUB_REF_NAME}.zip .)
          (cd artifacts && sha256sum * > SHA256SUMS.txt)
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" artifacts/* --verify-tag --generate-notes --title "FreeDeepSeeker $GITHUB_REF_NAME"
